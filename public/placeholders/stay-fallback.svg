<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Photo coming soon">
  <title>Stayze — stay photo placeholder</title>
  <!-- 16:10 fallback for a stay card with no image. Light plantation-ledger
       bands (flat, no gradients). Roofline is true to the brand mark: bark
       roof + walls, clay door. -->
  <rect width="640" height="400" fill="#F2ECE0"/>
  <!-- sun -->
  <circle cx="470" cy="150" r="34" fill="#C9A05C" opacity="0.55"/>
  <!-- far ridge -->
  <path d="M0 300 Q 160 250 320 285 T 640 270 V400 H0 Z" fill="#5B7553" opacity="0.18"/>
  <!-- near ridge -->
  <path d="M0 340 Q 200 300 400 335 T 640 320 V400 H0 Z" fill="#5B7553" opacity="0.30"/>
  <!-- roofline mark, centred -->
  <g transform="translate(320 175)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -30 12 L 0 -18 L 30 12" stroke="#3D2B1F" opacity="0.42"/>
    <path d="M -30 12 L -30 34 L 30 34 L 30 12" stroke="#3D2B1F" opacity="0.42"/>
    <path d="M -9 34 L -9 20 L 9 20 L 9 34" stroke="#B5651D" opacity="0.6"/>
  </g>
  <text x="320" y="255" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#8a7d6b">PHOTO COMING SOON</text>
</svg>
