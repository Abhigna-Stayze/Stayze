name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      # The build never opens a connection or uploads a file, but env.ts
      # validates all of these at import. Well-formed placeholders are enough;
      # real credentials are not needed and must never be put here.
      DATABASE_URL: postgresql://user:pass@localhost:6543/postgres?pgbouncer=true
      DIRECT_URL: postgresql://user:pass@localhost:5432/postgres
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-publishable-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key

    steps:
      - uses: actions/checkout@v4

      # Node 22+ is required by Prisma 7. Node 24 ships npm 11, which matches
      # the lockfile — npm 10 resolves optional native deps differently and
      # makes `npm ci` fail on a lockfile it considers out of sync.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # `npm install`, not `npm ci`: npm resolves optional native deps
      # (@emnapi, via tailwind's oxide-wasm fallback) differently across npm
      # versions, so `npm ci` rejects the lockfile as out of sync. Not worth
      # fighting. postinstall runs `prisma generate`, which the build needs.
      - run: npm install

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
