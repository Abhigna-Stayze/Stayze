name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      # The build never opens a connection, but env.ts validates these at import.
      # Well-formed placeholders are enough; real credentials are not needed.
      DATABASE_URL: postgresql://user:pass@localhost:6543/postgres?pgbouncer=true
      DIRECT_URL: postgresql://user:pass@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      # Node 22+ is required by Prisma 7. Node 24 ships npm 11, which matches
      # the lockfile — npm 10 resolves optional native deps differently and
      # makes `npm ci` fail on a lockfile it considers out of sync.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # `npm install`, not `npm ci`: npm resolves optional native deps
      # (@emnapi, via tailwind's oxide-wasm fallback) differently across npm
      # versions, so `npm ci` rejects the lockfile as out of sync. Not worth
      # fighting. postinstall runs `prisma generate`, which the build needs.
      - run: npm install

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
